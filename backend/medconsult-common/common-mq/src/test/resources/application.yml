# 测试用：RabbitMQ + Redis + H2
# 启动：docker run -d -p 5672:5672 rabbitmq:3-management-alpine
#       docker run -d -p 16379:6379 redis:7-alpine
spring:
  datasource:
    url: jdbc:h2:mem:medconsult_mq_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    # 凭证与 infra/docker-compose.yml 的 RABBITMQ_DEFAULT_USER/PASS 一致
    #（docker-compose 创建的是 medconsult/medconsult123，不是默认的 guest/guest）
    username: ${RABBITMQ_USER:medconsult}
    password: ${RABBITMQ_PASSWORD:medconsult123}
    # publisher confirm（MessageDispatcher 可靠投递测试前提）
    publisher-confirm-type: correlated
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:16379}
      timeout: 2000ms

mybatis-plus:
  global-config:
    db-config:
      id-type: ASSIGN_ID

medconsult:
  security:
    jwt:
      secret: medconsult-common-mq-test-secret-32bytes
