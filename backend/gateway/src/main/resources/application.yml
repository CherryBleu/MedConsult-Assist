server:
  port: 8080

spring:
  # 强制反应式：gateway 依赖 common-security 会传递引入 spring-boot-starter-web（servlet），
  # 与 gateway 的 webflux 冲突。显式声明 reactive 让 Boot 选 WebFlux 栈（Netty，非 Tomcat）。
  main:
    web-application-type: reactive
  # ⚠️ 虚拟线程在 gateway 关闭（与架构文档 §8.3 的"全局开启"形成有据偏离）。
  # 原因：spring.threads.virtual.enabled 仅对 servlet（Spring MVC）栈生效；
  # gateway 是 reactive/WebFlux 栈（reactor-netty NIO event loop），
  # 强行启用虚拟线程会导致 NettyRoutingFilter 死锁（请求挂在 lb→netty 转发环节，HTTP 000）。
  # 这是 Spring Boot 3.2.0 + reactor-netty 1.1.x 的已知限制，已在本地全链路验证复现并修复。
  # 其他 7 个 servlet 服务（auth/patient/...）仍开启虚拟线程——它们有阻塞 JDBC/BCrypt/Redis 调用，能受益。
  threads:
    virtual:
      enabled: false
  cloud:
    gateway:
      # 路由：/api/v1/auth/** → auth-service，基于 Nacos 服务名 lb:// 负载均衡
      # /internal/** 不配路由（JwtAuthFilter 也会拦，双保险）
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**
        - id: patient-service
          uri: lb://patient-service
          predicates:
            - Path=/api/v1/patients/**
        # 门诊服务：科室 / 医生 / 排班 / 预约挂号（架构文档 §1.1 outpatient-service）
        - id: outpatient-service
          uri: lb://outpatient-service
          predicates:
            # Spring Cloud Gateway Path 谓词支持逗号分隔多路径（注意：不是 {a,b} 集合语法，
            # 那是 PathPatternParser 的变量语法，Boot 3.2 会报错）。科室/医生/排班/预约都走门诊服务。
            - Path=/api/v1/departments/**,/api/v1/doctors/**,/api/v1/schedules/**,/api/v1/appointments/**
        # 药品库存服务：药品 / 库存出入库 / 流水 / 预警（架构文档 §1.1 drug-service）
        - id: drug-service
          uri: lb://drug-service
          predicates:
            - Path=/api/v1/drugs/**
        # 电子病历 + 处方 + 附件服务：病历 / 处方 / 附件（架构文档 §1.1 medical-record-service）
        # 逗号分隔多路径，同 outpatient-service 写法；/internal/** 不配路由（JwtAuthFilter 双保险）
        - id: medical-record-service
          uri: lb://medical-record-service
          predicates:
            - Path=/api/v1/medical-records/**,/api/v1/prescriptions/**,/api/v1/attachments/**
        # 通知 + 审计服务：站内通知 / 审计日志查询（架构文档 §1.1 notification-service）
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notifications/**,/api/v1/audit-logs/**
        # AI 辅助问诊服务：智能分诊 / 症状对话 / 病历摘要 / 用药分析 / 影像检测 / 反馈 / 文件上传（架构文档 §1.1 ai-service）
        - id: ai-service
          uri: lb://ai-service
          predicates:
            - Path=/api/v1/ai/**,/api/v1/files/**
        # ===== Knife4j 文档聚合专用路由 =====
        # discover 策略会从业务路由 Path 谓词推导文档 URL（如 /api/v1/auth/** → /api/v1/auth/v3/api-docs），
        # 但该 URL 经网关转发到下游时未剥前缀，下游 springdoc 服务在 /v3/api-docs 而非 /api/v1/auth/v3/api-docs → 404。
        # 改用 manual 策略 + 专用 StripPrefix 路由：浏览器 GET /doc/auth/v3/api-docs → 网关 StripPrefix=2
        # 剥离 /doc/auth → 下游收到 /v3/api-docs → 200。JwtAuthFilter 白名单放行 /doc/**。
        - id: doc-auth-service
          uri: lb://auth-service
          predicates:
            - Path=/doc/auth/**
          filters:
            - StripPrefix=2
        - id: doc-patient-service
          uri: lb://patient-service
          predicates:
            - Path=/doc/patient/**
          filters:
            - StripPrefix=2
        - id: doc-outpatient-service
          uri: lb://outpatient-service
          predicates:
            - Path=/doc/outpatient/**
          filters:
            - StripPrefix=2
        - id: doc-drug-service
          uri: lb://drug-service
          predicates:
            - Path=/doc/drug/**
          filters:
            - StripPrefix=2
        - id: doc-medical-record-service
          uri: lb://medical-record-service
          predicates:
            - Path=/doc/medical-record/**
          filters:
            - StripPrefix=2
        - id: doc-notification-service
          uri: lb://notification-service
          predicates:
            - Path=/doc/notification/**
          filters:
            - StripPrefix=2
        - id: doc-ai-service
          uri: lb://ai-service
          predicates:
            - Path=/doc/ai/**
          filters:
            - StripPrefix=2

# JWT（冒烟用固定密钥；生产从 Nacos/KMS 注入）
medconsult:
  security:
    jwt:
      secret: ${JWT_SECRET:dev-secret-0123456789abcdef0123456789abcdef-min32bytes}

logging:
  level:
    com.medconsult: DEBUG
    org.springframework.cloud.gateway: INFO

# Knife4j 网关聚合（OpenAPI3）—— manual 策略
# 不用 discover：discover 会从业务路由 Path 谓词推导文档 URL（/api/v1/auth/** → /api/v1/auth/v3/api-docs），
# 但该路径经网关转发不剥前缀，下游 springdoc 在 /v3/api-docs → 404。
# manual 显式声明每个服务的文档 URL，配合上方 /doc/{service}/** + StripPrefix=2 专用路由：
# 浏览器 GET /doc/auth/v3/api-docs/public-api → 网关剥 /doc/auth → 下游收到 /v3/api-docs/public-api → 200。
# springdoc 2.3.0 用路径变量 /v3/api-docs/{group}（非 ?group= 查询参数），
# /public-api 让下游返回 GroupedOpenApi 过滤后的文档（pathsToExclude 排除 /internal/** 和 /health/**）。
# 访问入口：http://localhost:8080/doc.html
knife4j:
  gateway:
    enabled: true
    strategy: manual
    routes:
      - name: 用户认证服务
        url: /doc/auth/v3/api-docs/public-api
        service-name: auth-service
        order: 1
      - name: 患者档案服务
        url: /doc/patient/v3/api-docs/public-api
        service-name: patient-service
        order: 2
      - name: 门诊服务
        url: /doc/outpatient/v3/api-docs/public-api
        service-name: outpatient-service
        order: 3
      - name: 药品库存服务
        url: /doc/drug/v3/api-docs/public-api
        service-name: drug-service
        order: 4
      - name: 电子病历+处方服务
        url: /doc/medical-record/v3/api-docs/public-api
        service-name: medical-record-service
        order: 5
      - name: 通知+审计服务
        url: /doc/notification/v3/api-docs/public-api
        service-name: notification-service
        order: 6
      - name: AI 辅助问诊服务
        url: /doc/ai/v3/api-docs/public-api
        service-name: ai-service
        order: 7
