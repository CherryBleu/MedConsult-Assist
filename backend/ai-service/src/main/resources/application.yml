# ai-service 本地配置（冒烟用最小集；生产走 Nacos 配置中心）
server:
  port: 8086
  address: 0.0.0.0  # 绑定所有接口（含 IPv6 ::1），让 gateway 的 Netty 客户端可连

spring:
  # 排除 Spring Boot 的 Mongo/R2DBC 自动装配：ai-service 通过 MongoDiseaseRepository
  # 手动创建 MongoClient（直连 medconsult.ai.mongo.uri），不依赖 Spring Data Mongo。
  # mongodb-driver-sync 5.1.2 与 Boot 3.2 的 MongoAutoConfiguration API 不兼容（StreamFactory）。
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration
      - org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration
  # 虚拟线程全局开启（架构文档 §8.3，servlet 服务）
  threads:
    virtual:
      enabled: true
  # 数据源：MySQL 8.0（infra/docker-compose.yml，宿主机端口 3307 映射到容器 3306）
  # 连 medconsult_ai schema（架构文档 §1.2 表归属矩阵：ai-service 独占）
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3307}/medconsult_ai?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USER:medconsult}
    password: ${MYSQL_PASSWORD:medconsult123}
  # Redis：限流（RateLimiter）+ SSE 事件总线（SseEventBus）+ MQ 幂等去重
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:16379}
      password: ${REDIS_PASSWORD:}
  # RabbitMQ：影像检测异步任务 + 调用日志异步落库（与 infra/docker-compose.yml 一致，宿主机 5672）
  rabbitmq:
    host: ${RABBITMQ_HOST:127.0.0.1}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:medconsult}
    password: ${RABBITMQ_PASSWORD:medconsult123}
    publisher-confirm-type: correlated
    publisher-returns: true
  sql:
    init:
      mode: always
  # 文件上传限制（医学影像可能较大）
  servlet:
    multipart:
      max-file-size: ${AI_UPLOAD_MAX_FILE_SIZE:200MB}
      max-request-size: ${AI_UPLOAD_MAX_REQUEST_SIZE:220MB}

# JWT（冒烟用固定密钥，与 auth/gateway 一致便于同密钥验签；生产从 Nacos/KMS 注入，架构文档 §7.3 §4.2）
medconsult:
  security:
    jwt:
      secret: ${JWT_SECRET:dev-secret-0123456789abcdef0123456789abcdef-min32bytes}
  # AI 域专有配置（medconsult.ai.*）
  ai:
    # LLM 走阿里云百炼（OpenAI 兼容协议，langchain4j OpenAiChatModel 直接可用）
    # 控制台 https://bailian.console.aliyun.com → API-KEY 获取 sk-...
    llm:
      base-url: ${ALIYUNBAILIAN_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      api-key: ${ALIYUNBAILIAN_APIKEY:sk-placeholder}
      model: ${ALIYUNBAILIAN_MODEL:qwen3.7-plus}
      timeout-seconds: ${ALIYUNBAILIAN_TIMEOUT_SECONDS:60}
    # Embedding 走本地 Python 容器（Flask + sentence-transformers，bge-small-zh-v1.5，512 维），与 LLM 完全解耦。
    # 导入(importer)和查询(runtime)必须用同一模型，否则 Milvus 向量语义空间不一致。
    embedding:
      base-url: ${EMBEDDING_BASE_URL:http://localhost:7997/v1}
      api-key: ${EMBEDDING_API_KEY:not-needed}
      model: ${EMBEDDING_MODEL:BAAI/bge-small-zh-v1.5}
      timeout-seconds: ${EMBEDDING_TIMEOUT_SECONDS:30}
    mongo:
      uri: ${MONGODB_URI:mongodb://localhost:27017}
      database: ${MONGODB_DATABASE:medconsult}
      collection: ${MONGODB_COLLECTION:diseases}
    redis:
      key-prefix: ${REDIS_KEY_PREFIX:medical:}
      cache-seconds: ${REDIS_CACHE_SECONDS:86400}
    milvus:
      uri: ${MILVUS_URI:http://localhost:19530}
      token: ${MILVUS_TOKEN:root:Milvus}
      database: ${MILVUS_DATABASE:medical}
      collection: ${MILVUS_COLLECTION:data}
      min-score: ${MILVUS_MIN_SCORE:0.60}
      metric-type: ${MILVUS_METRIC_TYPE:COSINE}
      search-timeout-seconds: ${MILVUS_SEARCH_TIMEOUT_SECONDS:15}
    # RAG 自检：防止 Mongo/Milvus 未导入数据或 embedding 维度错配时被误判为“无命中”
    rag:
      expected-mongo-count: ${RAG_EXPECTED_MONGO_COUNT:8807}
      expected-milvus-count: ${RAG_EXPECTED_MILVUS_COUNT:8807}
      expected-embedding-dimension: ${EMBEDDING_DIMENSION:512}
      startup-check-enabled: ${RAG_STARTUP_CHECK_ENABLED:true}
      fail-fast: ${RAG_FAIL_FAST:false}
      knowledge-version: ${RAG_KNOWLEDGE_VERSION:medical-data-unified-8807-v1}
    imaging:
      provider: ${IMAGING_PROVIDER:external-ai-provider}
      model: ${IMAGING_MODEL:chest-ct-abnormal-detector}
    # Vision 独立配置：影像检测用的专用模型（chest-ct-abnormal-detector），
    # 与 LLM 不是同一服务，单独配 base-url/api-key。
    vision:
      base-url: ${VISION_BASE_URL:https://api.openai.com/v1}
      api-key: ${VISION_API_KEY:sk-placeholder}
      model: ${VISION_MODEL:chest-ct-abnormal-detector}
      timeout-seconds: ${VISION_TIMEOUT_SECONDS:60}
      max-bytes-per-image: ${VISION_MAX_BYTES_PER_IMAGE:15728640}
    file-storage:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      public-endpoint: ${MINIO_PUBLIC_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
      region: ${MINIO_REGION:us-east-1}
      bucket: ${MINIO_BUCKET:medconsult}
      object-prefix: ${MINIO_OBJECT_PREFIX:imaging}
      chunk-prefix: ${MINIO_CHUNK_PREFIX:chunks}
      auto-create-bucket: ${MINIO_AUTO_CREATE_BUCKET:true}
      presigned-url-expiry-seconds: ${MINIO_PRESIGNED_URL_EXPIRY_SECONDS:300}
    # 服务身份（向 auth-service 换发 SERVICE JWT 用，架构文档 §4.2）
    internal:
      service-code: ${AI_SERVICE_CODE:ai-service}
      api-key: ${AI_SERVICE_API_KEY:dev-ai-service-api-key}
    rate-limit:
      enabled: ${AI_RATE_LIMIT_ENABLED:true}
      max-requests: ${AI_RATE_LIMIT_MAX_REQUESTS:60}
      window-seconds: ${AI_RATE_LIMIT_WINDOW_SECONDS:60}
      include-internal: ${AI_RATE_LIMIT_INCLUDE_INTERNAL:false}
      endpoint-max-requests:
        "POST /api/v1/ai/symptom-chat": ${AI_RATE_LIMIT_SYMPTOM_CHAT:30}
        "POST /api/v1/ai/triage": ${AI_RATE_LIMIT_TRIAGE:30}
        "POST /api/v1/ai/summary/by-record": ${AI_RATE_LIMIT_SUMMARY:20}
        "POST /api/v1/ai/medication-analysis": ${AI_RATE_LIMIT_MEDICATION:20}
        "POST /api/v1/ai/report-analysis": ${AI_RATE_LIMIT_REPORT:20}
        "POST /api/v1/ai/imaging-detection": ${AI_RATE_LIMIT_IMAGE:20}
    mq:
      retry:
        max-attempts: ${AI_MQ_RETRY_MAX_ATTEMPTS:3}
        initial-interval: ${AI_MQ_RETRY_INITIAL_INTERVAL:500ms}
        multiplier: ${AI_MQ_RETRY_MULTIPLIER:2.0}
        max-interval: ${AI_MQ_RETRY_MAX_INTERVAL:2s}
      dead-letter:
        confirm-timeout: ${AI_MQ_DEAD_LETTER_CONFIRM_TIMEOUT:5s}

mybatis-plus:
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.medconsult: DEBUG
    com.alibaba.cloud.nacos: DEBUG

# Knife4j / OpenAPI3 接口文档
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
knife4j:
  enable: true
  setting:
    language: zh_cn

management:
  endpoints:
    web:
      exposure:
        include: health,info
