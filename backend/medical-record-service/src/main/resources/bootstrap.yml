# Bootstrap：Nacos 注册 + 配置中心（架构文档 §7.3）
# 这两个必须在 bootstrap 阶段加载，早于 application.yml
spring:
  application:
    name: medical-record-service
  cloud:
    nacos:
      # 服务发现
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
      # 配置中心（先拉 medconsult-common.yaml 公共配置，再拉本服务私有配置）
      config:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: COMMON
        file-extension: yaml
        # 共享公共配置（数据源模板、Redis、MQ、JWT、虚拟线程等，架构文档 §7.3）
        shared-configs:
          - data-id: medconsult-common.yaml
            group: COMMON
            refresh: true
        # 本服务私有配置
        extension-configs:
          - data-id: medical-record-service.yaml
            group: COMMON
            refresh: true
        # 允许配置不存在时启动（冒烟阶段 Nacos 还没建配置）
        import-check:
          enabled: false
