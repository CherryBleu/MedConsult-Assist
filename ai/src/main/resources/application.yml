server:
  port: 8082

spring:
  application:
    name: medconsult-ai-service
  profiles:
    active: local
  config:
    import: optional:nacos:${spring.application.name}.yaml
  threads:
    virtual:
      enabled: true
  cloud:
    openfeign:
      okhttp:
        enabled: true
    nacos:
      config:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yaml
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        enabled: ${NACOS_DISCOVERY_ENABLED:false}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:mysql://localhost:3306/medconsult?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      database: 2
      password:
  rabbitmq:
    host: localhost
    port: 5773
    username: guest
    password: guest
  servlet:
    multipart:
      max-file-size: ${AI_UPLOAD_MAX_FILE_SIZE:200MB}
      max-request-size: ${AI_UPLOAD_MAX_REQUEST_SIZE:220MB}

medconsult:
  ai:
    llm:
      base-url: ${OPENAI_BASE_URL}
      api-key: ${OPENAI_API_KEY}
      model: gpt-5.5
      timeout-seconds: 30
    embedding:
      base-url: ${OPENAI_BASE_URL}
      api-key: ${OPENAI_API_KEY}
      model: text-embedding-3-small
      timeout-seconds: 30
    mongo:
      uri: mongodb://localhost:27017
      database: medconsult
      collection: diseases
    redis:
      key-prefix: "medical:"
      cache-seconds: 86400
    milvus:
      uri: http://localhost:19530
      token: root:Milvus
      database: medical
      collection: data
      min-score: 0.60
    imaging:
      provider: external-ai-provider
      model: chest-ct-abnormal-detector
    vision:
      base-url: ${VISION_BASE_URL:${OPENAI_BASE_URL}}
      api-key: ${VISION_API_KEY:${OPENAI_API_KEY}}
      model: ${VISION_MODEL:chest-ct-abnormal-detector}
      timeout-seconds: ${VISION_TIMEOUT_SECONDS:60}
      max-bytes-per-image: ${VISION_MAX_BYTES_PER_IMAGE:15728640}
    file-storage:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      public-endpoint: ${MINIO_PUBLIC_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
      bucket: ${MINIO_BUCKET:medconsult}
      object-prefix: ${MINIO_OBJECT_PREFIX:imaging}
      chunk-prefix: ${MINIO_CHUNK_PREFIX:chunks}
      auto-create-bucket: ${MINIO_AUTO_CREATE_BUCKET:true}
    internal:
      service-code: ai-service
      api-key: ${AI_INTERNAL_API_KEY:dev-ai-internal-key}
      service-token: ${AI_INTERNAL_SERVICE_TOKEN:dev-ai-service-token}
      auth-service-verify-enabled: ${AI_AUTH_SERVICE_VERIFY_ENABLED:false}
      legacy-api-key-enabled: ${AI_LEGACY_API_KEY_ENABLED:true}
    mq:
      exchange: ai.exchange
      image-detection-queue: ai.image.detect.queue
      call-log-queue: ai.calllog.queue
    rate-limit:
      enabled: ${AI_RATE_LIMIT_ENABLED:true}
      max-requests: ${AI_RATE_LIMIT_MAX_REQUESTS:60}
      window-seconds: ${AI_RATE_LIMIT_WINDOW_SECONDS:60}
      include-internal: ${AI_RATE_LIMIT_INCLUDE_INTERNAL:false}
      endpoint-max-requests:
        "POST /api/v1/ai/symptom-chat": ${AI_RATE_LIMIT_SYMPTOM_CHAT:30}
        "POST /api/v1/ai/triage": ${AI_RATE_LIMIT_TRIAGE:30}
        "POST /api/v1/ai/medical-record-summary": ${AI_RATE_LIMIT_SUMMARY:20}
        "POST /api/v1/ai/medication-analysis": ${AI_RATE_LIMIT_MEDICATION:20}
        "POST /api/v1/ai/report-analysis": ${AI_RATE_LIMIT_REPORT:20}
        "POST /api/v1/ai/image-detection": ${AI_RATE_LIMIT_IMAGE:20}

---
spring:
  config:
    activate:
      on-profile: prod
  cloud:
    nacos:
      config:
        server-addr: ${NACOS_SERVER_ADDR}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yaml
      discovery:
        server-addr: ${NACOS_SERVER_ADDR}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        enabled: ${NACOS_DISCOVERY_ENABLED:true}
  datasource:
    url: ${MYSQL_URL}
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:2}
      password: ${REDIS_PASSWORD:}
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
  servlet:
    multipart:
      max-file-size: ${AI_UPLOAD_MAX_FILE_SIZE:200MB}
      max-request-size: ${AI_UPLOAD_MAX_REQUEST_SIZE:220MB}

medconsult:
  ai:
    llm:
      base-url: ${OPENAI_BASE_URL}
      api-key: ${OPENAI_API_KEY}
      model: ${OPENAI_MODEL:gpt-4o-mini}
      timeout-seconds: ${OPENAI_TIMEOUT_SECONDS:60}
    embedding:
      base-url: ${EMBEDDING_BASE_URL:${OPENAI_BASE_URL}}
      api-key: ${EMBEDDING_API_KEY:${OPENAI_API_KEY}}
      model: ${EMBEDDING_MODEL:text-embedding-3-small}
      timeout-seconds: ${EMBEDDING_TIMEOUT_SECONDS:60}
    mongo:
      uri: ${MONGODB_URI}
      database: ${MONGODB_DATABASE:medconsult}
      collection: ${MONGODB_COLLECTION:diseases}
    redis:
      key-prefix: ${REDIS_KEY_PREFIX:medical:}
      cache-seconds: ${REDIS_CACHE_SECONDS:86400}
    milvus:
      uri: ${MILVUS_URI}
      token: ${MILVUS_TOKEN:}
      database: ${MILVUS_DATABASE:medical}
      collection: ${MILVUS_COLLECTION:data}
      min-score: ${MILVUS_MIN_SCORE:0.60}
    imaging:
      provider: ${IMAGING_PROVIDER:external-ai-provider}
      model: ${IMAGING_MODEL:chest-ct-abnormal-detector}
    vision:
      base-url: ${VISION_BASE_URL}
      api-key: ${VISION_API_KEY}
      model: ${VISION_MODEL:chest-ct-abnormal-detector}
      timeout-seconds: ${VISION_TIMEOUT_SECONDS:60}
      max-bytes-per-image: ${VISION_MAX_BYTES_PER_IMAGE:15728640}
    file-storage:
      endpoint: ${MINIO_ENDPOINT}
      public-endpoint: ${MINIO_PUBLIC_ENDPOINT:${MINIO_ENDPOINT}}
      access-key: ${MINIO_ACCESS_KEY}
      secret-key: ${MINIO_SECRET_KEY}
      bucket: ${MINIO_BUCKET:medconsult}
      object-prefix: ${MINIO_OBJECT_PREFIX:imaging}
      chunk-prefix: ${MINIO_CHUNK_PREFIX:chunks}
      auto-create-bucket: ${MINIO_AUTO_CREATE_BUCKET:false}
    internal:
      service-code: ${AI_INTERNAL_SERVICE_CODE:ai-service}
      api-key: ${AI_INTERNAL_API_KEY}
      service-token: ${AI_INTERNAL_SERVICE_TOKEN}
      auth-service-verify-enabled: ${AI_AUTH_SERVICE_VERIFY_ENABLED:true}
      legacy-api-key-enabled: ${AI_LEGACY_API_KEY_ENABLED:false}
    mq:
      exchange: ${AI_MQ_EXCHANGE:ai.exchange}
      image-detection-queue: ${AI_IMAGE_DETECTION_QUEUE:ai.image.detect.queue}
      call-log-queue: ${AI_CALL_LOG_QUEUE:ai.calllog.queue}
    rate-limit:
      enabled: ${AI_RATE_LIMIT_ENABLED:true}
      max-requests: ${AI_RATE_LIMIT_MAX_REQUESTS:60}
      window-seconds: ${AI_RATE_LIMIT_WINDOW_SECONDS:60}
      include-internal: ${AI_RATE_LIMIT_INCLUDE_INTERNAL:false}
      endpoint-max-requests:
        "POST /api/v1/ai/symptom-chat": ${AI_RATE_LIMIT_SYMPTOM_CHAT:30}
        "POST /api/v1/ai/triage": ${AI_RATE_LIMIT_TRIAGE:30}
        "POST /api/v1/ai/medical-record-summary": ${AI_RATE_LIMIT_SUMMARY:20}
        "POST /api/v1/ai/medication-analysis": ${AI_RATE_LIMIT_MEDICATION:20}
        "POST /api/v1/ai/report-analysis": ${AI_RATE_LIMIT_REPORT:20}
        "POST /api/v1/ai/image-detection": ${AI_RATE_LIMIT_IMAGE:20}
