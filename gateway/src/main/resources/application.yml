server:
  port: 8080

spring:
  # 强制反应式：gateway 依赖 common-security 会传递引入 spring-boot-starter-web（servlet），
  # 与 gateway 的 webflux 冲突。显式声明 reactive 让 Boot 选 WebFlux 栈（Netty，非 Tomcat）。
  main:
    web-application-type: reactive
  # ⚠️ 虚拟线程在 gateway 关闭（与架构文档 §8.3 的"全局开启"形成有据偏离）。
  # 原因：spring.threads.virtual.enabled 仅对 servlet（Spring MVC）栈生效；
  # gateway 是 reactive/WebFlux 栈（reactor-netty NIO event loop），
  # 强行启用虚拟线程会导致 NettyRoutingFilter 死锁（请求挂在 lb→netty 转发环节，HTTP 000）。
  # 这是 Spring Boot 3.2.0 + reactor-netty 1.1.x 的已知限制，已在本地全链路验证复现并修复。
  # 其他 7 个 servlet 服务（auth/patient/...）仍开启虚拟线程——它们有阻塞 JDBC/BCrypt/Redis 调用，能受益。
  threads:
    virtual:
      enabled: false
  cloud:
    gateway:
      # 路由：/api/v1/auth/** → auth-service，基于 Nacos 服务名 lb:// 负载均衡
      # /internal/** 不配路由（JwtAuthFilter 也会拦，双保险）
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**
        - id: patient-service
          uri: lb://patient-service
          predicates:
            - Path=/api/v1/patients/**
        # 门诊服务：科室 / 医生 / 排班 / 预约挂号（架构文档 §1.1 outpatient-service）
        - id: outpatient-service
          uri: lb://outpatient-service
          predicates:
            # Spring Cloud Gateway Path 谓词支持逗号分隔多路径（注意：不是 {a,b} 集合语法，
            # 那是 PathPatternParser 的变量语法，Boot 3.2 会报错）。科室/医生/排班/预约都走门诊服务。
            - Path=/api/v1/departments/**,/api/v1/doctors/**,/api/v1/schedules/**,/api/v1/appointments/**
        # 药品库存服务：药品 / 库存出入库 / 流水 / 预警（架构文档 §1.1 drug-service）
        - id: drug-service
          uri: lb://drug-service
          predicates:
            - Path=/api/v1/drugs/**
        # 电子病历 + 处方服务：病历 / 处方（架构文档 §1.1 medical-record-service）
        # 逗号分隔多路径，同 outpatient-service 写法；/internal/** 不配路由（JwtAuthFilter 双保险）
        - id: medical-record-service
          uri: lb://medical-record-service
          predicates:
            - Path=/api/v1/medical-records/**,/api/v1/prescriptions/**
        # 通知 + 审计服务：站内通知 / 审计日志查询（架构文档 §1.1 notification-service）
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notifications/**,/api/v1/audit-logs/**
        # 后续业务服务陆续加入：
        # - id: ai-service ...

# JWT（冒烟用固定密钥；生产从 Nacos/KMS 注入）
medconsult:
  security:
    jwt:
      secret: ${JWT_SECRET:dev-secret-0123456789abcdef0123456789abcdef-min32bytes}

logging:
  level:
    com.medconsult: DEBUG
    org.springframework.cloud.gateway: INFO
