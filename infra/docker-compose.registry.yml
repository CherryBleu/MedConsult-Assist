name: medconsult

x-backend-env: &backend-env
  NACOS_ADDR: medconsult-nacos:8848
  NACOS_NAMESPACE: ${NACOS_NAMESPACE:-public}
  NACOS_GROUP: ${NACOS_GROUP:-DEFAULT_GROUP}
  MYSQL_HOST: medconsult-mysql
  MYSQL_PORT: "3306"
  MYSQL_USER: ${MYSQL_USER:-medconsult}
  MYSQL_PASSWORD: ${MYSQL_PASSWORD:-medconsult123}
  REDIS_HOST: medconsult-redis
  REDIS_PORT: "6379"
  REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  RABBITMQ_HOST: medconsult-rabbitmq
  RABBITMQ_PORT: "5672"
  RABBITMQ_USER: ${RABBITMQ_USER:-medconsult}
  RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-medconsult123}
  JWT_SECRET: ${JWT_SECRET:-dev-secret-0123456789abcdef0123456789abcdef-min32bytes}

x-ai-env: &ai-env
  MONGODB_URI: ${MONGODB_URI:-mongodb://medconsult-mongodb:27017}
  MONGODB_DATABASE: ${MONGODB_DATABASE:-medconsult}
  MONGODB_COLLECTION: ${MONGODB_COLLECTION:-diseases}
  MILVUS_URI: ${MILVUS_URI:-http://medconsult-milvus:19530}
  MILVUS_TOKEN: ${MILVUS_TOKEN:-root:Milvus}
  MILVUS_DATABASE: ${MILVUS_DATABASE:-medical}
  MILVUS_COLLECTION: ${MILVUS_COLLECTION:-data}
  MILVUS_MIN_SCORE: ${MILVUS_MIN_SCORE:-0.60}
  MILVUS_METRIC_TYPE: ${MILVUS_METRIC_TYPE:-COSINE}
  MILVUS_SEARCH_TIMEOUT_SECONDS: ${MILVUS_SEARCH_TIMEOUT_SECONDS:-15}
  MINIO_ENDPOINT: http://medconsult-minio:9000
  MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-http://localhost:9000}
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
  MINIO_BUCKET: ${MINIO_BUCKET:-medconsult}
  EMBEDDING_BASE_URL: http://medconsult-embedding:7997/v1
  EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-not-needed}
  EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-small-zh-v1.5}
  EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-512}
  ALIYUNBAILIAN_BASE_URL: ${ALIYUNBAILIAN_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
  ALIYUNBAILIAN_APIKEY: ${ALIYUNBAILIAN_APIKEY:-sk-placeholder}
  ALIYUNBAILIAN_MODEL: ${ALIYUNBAILIAN_MODEL:-qwen3.7-plus}
  ALIYUNBAILIAN_TIMEOUT_SECONDS: ${ALIYUNBAILIAN_TIMEOUT_SECONDS:-60}
  VISION_BASE_URL: ${VISION_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
  VISION_API_KEY: ${VISION_API_KEY:-sk-placeholder}
  VISION_MODEL: ${VISION_MODEL:-qwen3.7-plus}

services:
  nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: medconsult-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 256m
      JVM_XMX: 512m
      JVM_XMN: 128m
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:18848:8848"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8848/nacos/"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    networks: [medconsult-net]

  mysql:
    image: mysql:8.0
    container_name: medconsult-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_USER: ${MYSQL_USER:-medconsult}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-medconsult123}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+08:00
      - --max-connections=200
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
      - ./mysql/conf.d:/etc/mysql/conf.d:ro
      - ./mysql/log:/var/log/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [medconsult-net]

  redis:
    image: redis:7-alpine
    container_name: medconsult-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:16379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [medconsult-net]

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: medconsult-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-medconsult}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-medconsult123}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 30s
    networks: [medconsult-net]

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: medconsult-qdrant
    restart: unless-stopped
    environment:
      QDRANT__LOG_LEVEL: ${QDRANT_LOG_LEVEL:-info}
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333 && echo -e 'GET /readyz HTTP/1.1\\r\\nhost: localhost\\r\\n\\r' >&3 && cat <&3 | head -1 | grep -q 200"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks: [medconsult-net]

  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: medconsult-milvus-etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - milvus_etcd_data:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks: [medconsult-net]

  milvus-minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: medconsult-milvus-minio
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - milvus_minio_data:/minio_data
    command: minio server /minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks: [medconsult-net]

  milvus:
    image: milvusdb/milvus:v2.4.13
    container_name: medconsult-milvus
    restart: unless-stopped
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
      MINIO_REGION: ${MILVUS_REGION:-us-east-1}
    command: ["milvus", "run", "standalone"]
    ports:
      - "127.0.0.1:19530:19530"
      - "127.0.0.1:9091:9091"
    depends_on:
      milvus-etcd:
        condition: service_healthy
      milvus-minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 10
      start_period: 90s
    networks: [medconsult-net]

  minio:
    image: minio/minio:RELEASE.2024-08-03T04-33-23Z
    container_name: medconsult-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BROWSER: "on"
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks: [medconsult-net]

  embedding:
    image: ${MEDCONSULT_IMAGE_REPOSITORY:-cherrybleu/medconsult-assist}:embedding-${MEDCONSULT_IMAGE_TAG:-latest}
    container_name: medconsult-embedding
    restart: unless-stopped
    environment:
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-small-zh-v1.5}
      EMBEDDING_PORT: 7997
      EMBEDDING_DEVICE: cpu
      HF_ENDPOINT: ${HF_ENDPOINT:-https://hf-mirror.com}
    ports:
      - "127.0.0.1:7997:7997"
    volumes:
      - embedding_model_cache:/app/models
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7997/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks: [medconsult-net]

  mongodb:
    image: mongo:7
    container_name: medconsult-mongodb
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MONGODB_HOST_PORT:-27018}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [medconsult-net]

  auth-service:
    image: ${MEDCONSULT_IMAGE_REPOSITORY:-cherrybleu/medconsult-assist}:auth-service-${MEDCONSULT_IMAGE_TAG:-latest}
    container_name: medconsult-auth-service
    restart: unless-stopped
    environment:
      <<: *backend-env
    networks: [medconsult-net]

  patient-service:
    image: ${MEDCONSULT_IMAGE_REPOSITORY:-cherrybleu/medconsult-assist}:patient-service-${MEDCONSULT_IMAGE_TAG:-latest}
    container_name: medconsult-patient-service
    restart: unless-stopped
    environment:
      <<: *backend-env
    networks: [medconsult-net]

  outpatient-service:
    image: ${MEDCONSULT_IMAGE_REPOSITORY:-cherrybleu/medconsult-assist}:outpatient-service-${MEDCONSULT_IMAGE_TAG:-latest}
    container_name: medconsult-outpatient-service
    restart: unless-stopped
    environment:
      <<: *backend-env
    networks: [medconsult-net]

  medical-record-service:
    image: ${MEDCONSULT_IMAGE_REPOSITORY:-cherrybleu/medconsult-assist}:medical-record-service-${MEDCONSULT_IMAGE_TAG:-latest}
    container_name: medconsult-medical-record-service
    restart: unless-stopped
    environment:
      <<: *backend-env
    networks: [medconsult-net]

  drug-service:
    image: ${MEDCONSULT_IMAGE_REPOSITORY:-cherrybleu/medconsult-assist}:drug-service-${MEDCONSULT_IMAGE_TAG:-latest}
    container_name: medconsult-drug-service
    restart: unless-stopped
    environment:
      <<: *backend-env
    networks: [medconsult-net]

  notification-service:
    image: ${MEDCONSULT_IMAGE_REPOSITORY:-cherrybleu/medconsult-assist}:notification-service-${MEDCONSULT_IMAGE_TAG:-latest}
    container_name: medconsult-notification-service
    restart: unless-stopped
    environment:
      <<: *backend-env
    networks: [medconsult-net]

  ai-service:
    image: ${MEDCONSULT_IMAGE_REPOSITORY:-cherrybleu/medconsult-assist}:ai-service-${MEDCONSULT_IMAGE_TAG:-latest}
    container_name: medconsult-ai-service
    restart: unless-stopped
    environment:
      <<: [*backend-env, *ai-env]
    networks: [medconsult-net]

  gateway:
    image: ${MEDCONSULT_IMAGE_REPOSITORY:-cherrybleu/medconsult-assist}:gateway-${MEDCONSULT_IMAGE_TAG:-latest}
    container_name: medconsult-gateway
    restart: unless-stopped
    environment:
      NACOS_ADDR: medconsult-nacos:8848
      NACOS_NAMESPACE: ${NACOS_NAMESPACE:-public}
      NACOS_GROUP: ${NACOS_GROUP:-DEFAULT_GROUP}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-0123456789abcdef0123456789abcdef-min32bytes}
    ports:
      - "127.0.0.1:8080:8080"
    networks: [medconsult-net]

  frontend:
    image: ${MEDCONSULT_IMAGE_REPOSITORY:-cherrybleu/medconsult-assist}:frontend-${MEDCONSULT_IMAGE_TAG:-latest}
    container_name: medconsult-frontend
    restart: unless-stopped
    mem_limit: 64m
    environment:
      GATEWAY_UPSTREAM: medconsult-gateway:8080
    ports:
      - "127.0.0.1:3000:80"
    networks: [medconsult-net]

volumes:
  mysql_data:
  redis_data:
  qdrant_data:
  rabbitmq_data:
  mongo_data:
  milvus_etcd_data:
  milvus_minio_data:
  minio_data:
  embedding_model_cache:

networks:
  medconsult-net:
    name: medconsult-net
    driver: bridge
