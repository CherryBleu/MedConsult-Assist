# MedConsult-Assist 基础设施本地编排（架构文档 §1.1 §10）
#
# 范围：编排 8 个服务 ——
#   核心业务：MySQL / Redis / RabbitMQ
#   AI 域：Qdrant（备用向量库）/ Milvus（向量检索，含 etcd + 内置 minio 依赖）/ MinIO（影像存储）
#   AI 域：Embedding（bge-small-zh-v1.5，OpenAI 兼容 /v1/embeddings，随 compose 自动拉起）
#
#   Nacos 由独立脚本启动（D:\springcloudalibaba\nacos-server-2.3.0\nacos\bin\startup.cmd），
#   因为它有 GUI 启动习惯且部分配置走本地文件，不入 compose。
#   MongoDB 由用户本机安装（不走容器，便于复用已有实例）。
#
# 端口选择（避开 Windows 主机原生服务）：
#   - 3306 被本机 mysqld.exe 占用 → MySQL 容器走 3307
#   - 6379 被本机 memurai.exe 占用 → Redis 容器走 16379
#   - 27017 本机 MongoDB 已占用 → 不再起容器（由本机实例提供）
#   - 其余保持官方默认
#
# 启动：  docker compose -f infra/docker-compose.yml up -d
# 停止：  docker compose -f infra/docker-compose.yml down
# 重置：  docker compose -f infra/docker-compose.yml down -v   # 删数据卷
#
# 红线 1 合规：MySQL 8.0 / Redis / RabbitMQ / Qdrant 版本严格锁定（见 medconsult-parent pom.xml）。
#           Milvus / MinIO 为 AI 域依赖，版本锁定见各自 image 标签。

name: medconsult

services:

  # ============== MySQL 8.0 ==============
  # 按 §1.2 表归属矩阵为每个服务建独立 schema，禁止跨 schema join（架构红线）。
  mysql:
    image: mysql:8.0
    container_name: medconsult-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      # 业务库账号（与 ai-service / 各服务 application.yml 读取的 MYSQL_USER/MYSQL_PASSWORD 对齐，
      # 避免运维改了 .env 的密码但服务仍用默认值连不上库）
      MYSQL_USER: ${MYSQL_USER:-medconsult}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-medconsult123}
      TZ: Asia/Shanghai
    command:
      # 红线 1：utf8mb4_0900_ai_ci 是 MySQL 8.0 默认，匹配数据库设计文档 §1 通用约定
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+08:00
      - --max-connections=200
    ports:
      # 绑定 127.0.0.1：开发端口不对外暴露（避免不可信网段直连弱口令的 MySQL/Redis/MQ）
      - "127.0.0.1:3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
      - ./mysql/conf.d:/etc/mysql/conf.d:ro
      - ./mysql/log:/var/log/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [medconsult-net]

  # ============== Redis 7（缓存 / 分布式锁 / SSE 广播 / 限流）==============
  # 架构文档 §7：业务并发禁止用 JVM 锁，所有锁/限流/SSE 广播走 Redis（多实例一致）
  redis:
    image: redis:7-alpine
    container_name: medconsult-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:16379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [medconsult-net]

  # ============== Qdrant（向量库 / RAG 检索）==============
  # 需求文档 §4.2.0：疾病 JSON 切片向量存 Qdrant/Milvus，仅存索引，原始 JSON 是唯一知识来源。
  # 选择 Qdrant（轻量，单容器即可；Milvus 需要 etcd+minio 三件套，过重）。
  # ai-service 独占访问。
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: medconsult-qdrant
    restart: unless-stopped
    environment:
      QDRANT__LOG_LEVEL: ${QDRANT_LOG_LEVEL:-info}
    ports:
      # REST / gRPC（gRPC 性能更好，Spring AI Qdrant 客户端优先用 gRPC）
      - "127.0.0.1:6333:6333"   # REST
      - "127.0.0.1:6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333 && echo -e 'GET /readyz HTTP/1.1\\r\\nhost: localhost\\r\\n\\r' >&3 && cat <&3 | head -1 | grep -q 200"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks: [medconsult-net]

  # ============== RabbitMQ（异步解耦 / 可靠投递 / SSE 跨实例广播）==============
  # 架构文档 §6：本地消息表 + RabbitMQ + 消费幂等（最终一致性，不用 Seata）
  # §9.2：多实例 SSE 广播靠 RabbitMQ fanout → 每实例订阅自己的临时队列
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: medconsult-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-medconsult}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-medconsult123}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:5672:5672"     # AMQP
      - "127.0.0.1:15672:15672"   # 管理控制台
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 30s
    networks: [medconsult-net]

  # ============== Milvus 元数据存储（etcd，Milvus 独占）==============
  # Milvus standalone 三件套之一：etcd 存 collection/schema 元数据。
  # 仅容器内部可见，不暴露宿主机端口。
  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: medconsult-milvus-etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - milvus_etcd_data:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks: [medconsult-net]

  # ============== Milvus 内置对象存储（MinIO，Milvus 独占，与下方 app MinIO 隔离）==============
  # Milvus standalone 三件套之二：存 segment 数据文件。
  # 用独立容器名 + 独立卷 + 不暴露端口，避免与影像存储的 medconsult-minio 冲突。
  milvus-minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: medconsult-milvus-minio
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - milvus_minio_data:/minio_data
    command: minio server /minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks: [medconsult-net]

  # ============== Milvus standalone（向量检索 / RAG）==============
  # 架构文档 §需求 4.2.0：疾病 JSON 切片向量存 Milvus，仅存索引。
  # ai-service 的 MilvusRestClient 调 REST /v2/vectordb/entities/search。
  # 版本：2.4.x 是首个提供完整 REST v2 API 的稳定线；锁定 2.4.13。
  milvus:
    image: milvusdb/milvus:v2.4.13
    container_name: medconsult-milvus
    restart: unless-stopped
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
      MINIO_REGION: ${MILVUS_REGION:-us-east-1}
    command: ["milvus", "run", "standalone"]
    ports:
      - "127.0.0.1:19530:19530"   # gRPC（Milvus SDK 用）
      - "127.0.0.1:9091:9091"     # 健康/metrics
    depends_on:
      milvus-etcd:
        condition: service_healthy
      milvus-minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 10
      start_period: 90s
    networks: [medconsult-net]

  # ============== MinIO（影像文件存储 / FileUploadService 用）==============
  # 需求文档 §4.2.x：医学影像上传 MinIO，ai-service 通过 minio 8.5.x SDK 访问。
  # 与 Milvus 内置 minio 物理隔离（独立容器名、独立卷、独立端口）。
  # auto-create-bucket=true 时 ai-service 首次启动自动建 medconsult bucket。
  minio:
    image: minio/minio:RELEASE.2024-08-03T04-33-23Z
    container_name: medconsult-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BROWSER: "on"
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"   # S3 API（ai-service 访问）
      - "127.0.0.1:9001:9001"   # Web 控制台
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks: [medconsult-net]

  # ============== Embedding 服务（Python + sentence-transformers）==============
  # ai-service RAG 链路的 embedding 组件，提供 OpenAI 兼容 /v1/embeddings。
  # 模型 BAAI/bge-small-zh-v1.5（95MB，512 维，CPU 推理单条几十 ms）。
  # 随 docker compose up 自动拉起；ai-service 的 EMBEDDING_BASE_URL 指向 http://localhost:7997/v1。
  # 首次启动从 HuggingFace 下载模型（走 hf-mirror.com 镜像），缓存在命名卷内。
  embedding:
    build:
      context: ./embedding-server
      dockerfile: Dockerfile
    image: medconsult-embedding:local
    container_name: medconsult-embedding
    restart: unless-stopped
    environment:
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-small-zh-v1.5}
      EMBEDDING_PORT: 7997
      EMBEDDING_DEVICE: cpu
      HF_ENDPOINT: ${HF_ENDPOINT:-https://hf-mirror.com}
    ports:
      - "127.0.0.1:7997:7997"
    volumes:
      - embedding_model_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7997/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks: [medconsult-net]

volumes:
  mysql_data:
  redis_data:
  qdrant_data:
  rabbitmq_data:
  milvus_etcd_data:
  milvus_minio_data:
  minio_data:
  embedding_model_cache:

networks:
  medconsult-net:
    name: medconsult-net
    driver: bridge
